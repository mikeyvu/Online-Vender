<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="assets/css/payment.css">
    <!-- Optionally, you can include Bootstrap or any other CSS framework for styling tabs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Include the payment.js file -->
    <script src="assets/js/payment.js"></script>
</head>

<body>
    <div class="container">
        <!-- Order Summary Section -->
        <section id="order-summary">
            <h2>Order Summary</h2>
            <div id="order-items"></div>
            <h3>Total Cost: $<span id="total-cost"></span></h3>
        </section>

        <!-- Payment Options Tabs -->
        <section id="payment-options">
            <ul class="nav nav-tabs" id="paymentTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <a class="nav-link active" id="card-tab" data-bs-toggle="tab" href="#card" role="tab" aria-controls="card" aria-selected="true">Debit/Credit Card</a>
                </li>
                <li class="nav-item" role="presentation">
                    <a class="nav-link" id="applepay-tab" data-bs-toggle="tab" href="#applepay" role="tab" aria-controls="applepay" aria-selected="false">Apple Pay</a>
                </li>
                <li class="nav-item" role="presentation">
                    <a class="nav-link" id="paypal-tab" data-bs-toggle="tab" href="#paypal" role="tab" aria-controls="paypal" aria-selected="false">PayPal</a>
                </li>
            </ul>
            <div class="tab-content" id="paymentTabContent">
                <!-- Debit/Credit Card Payment Form -->
                <div class="tab-pane fade show active" id="card" role="tabpanel" aria-labelledby="card-tab">
                    <form id="card-form">
                        <label for="card-number">Card Number:</label>
                        <input type="text" id="card-number" name="card-number" required>

                        <label for="expiry-date">Expiry Date:</label>
                        <input type="text" id="expiry-date" name="expiry-date" required>

                        <label for="cvv">CVV:</label>
                        <input type="text" id="cvv" name="cvv" required>

                        <button type="submit" class="btn btn-primary">Pay Now</button>
                    </form>
                </div>

                <!-- Apple Pay Form -->
                <div class="tab-pane fade" id="applepay" role="tabpanel" aria-labelledby="applepay-tab">
                    <form id="applepay-form">
                        <label for="applepay-email">Apple Pay Email:</label>
                        <input type="email" id="applepay-email" name="applepay-email" required>

                        <button type="submit" class="btn btn-primary">Pay Now</button>
                    </form>
                </div>

                <!-- PayPal Form -->
                <div class="tab-pane fade" id="paypal" role="tabpanel" aria-labelledby="paypal-tab">
                    <form id="paypal-form">
                        <label for="paypal-email">PayPal Email:</label>
                        <input type="email" id="paypal-email" name="paypal-email" required>

                        <button type="submit" class="btn btn-primary">Pay Now</button> 
                    </form>
                </div>
            </div>
        </section>

        <a href="shopping_cart.html"><button class="back-to-cart">Back to shopping cart</button></a>
    </div>

    <!-- Optional: Include Bootstrap JS for tabs functionality -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="payment.js"></script>
</body>

</html>
